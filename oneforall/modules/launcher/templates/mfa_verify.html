<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two-Step Verification — ThemisIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:linear-gradient(160deg,#e8f0fe 0%,#f0f4fb 45%,#e6f7fb 100%);color:#1e293b}
.wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:18px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 20px 50px rgba(15,23,42,.08)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.brand-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#1e3a8a,#2563eb);display:grid;place-items:center;color:#fff;font-weight:800}
.brand-name{font-weight:800;font-size:15px;color:#0f172a;letter-spacing:.02em}
h1{font-size:20px;font-weight:800;color:#0f172a;margin-bottom:6px}
p.lead{color:#64748b;font-size:13px;margin-bottom:22px;line-height:1.5}
.error{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px}
input[type=text]{width:100%;padding:14px 16px;border:1px solid #e2e8f0;border-radius:10px;font-size:22px;letter-spacing:6px;text-align:center;font-family:'JetBrains Mono',monospace;background:#f8fafc;color:#0f172a}
input[type=text]:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12);background:#fff}
button{width:100%;padding:13px;margin-top:14px;background:#1e3a8a;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:opacity .15s}
button:hover{opacity:.92}
.hint{font-size:12px;color:#64748b;margin-top:18px;text-align:center}
.hint a{color:#2563eb;text-decoration:none;font-weight:600}
.hint a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">
      <div class="brand-mark">T</div>
      <div class="brand-name">ThemisIQ</div>
    </div>
    <h1>Two-step verification</h1>
    <p class="lead">Enter the 6-digit code from your authenticator app, or use one of your backup codes.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/mfa/verify" autocomplete="off">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <input type="text" name="code" placeholder="000000" autofocus inputmode="numeric"
             maxlength="20" autocomplete="one-time-code"/>
      <button type="submit">Verify</button>
    </form>
    <div class="hint">
      Lost your device? <a href="/logout">Sign out</a> and contact your administrator.
    </div>
  </div>
</div>
</body>
</html>
