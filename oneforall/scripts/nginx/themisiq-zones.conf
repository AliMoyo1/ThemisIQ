# ThemisIQ nginx rate limiting zones.
# Installed to /etc/nginx/conf.d/themisiq-zones.conf by deploy.py.
# Must live in http context (conf.d is included before sites-enabled).

# ── Trust Cloudflare's edge network ─────────────────────────────────────────
# Without this, $binary_remote_addr is the Cloudflare proxy IP and every user
# behind the same CF datacenter shares one rate-limit bucket. That's why
# "429 Too Many Requests" hit users on their first login of the day.
#
# With set_real_ip_from + real_ip_header, nginx rewrites $remote_addr to the
# actual visitor IP AFTER the CF hop, so rate limits are per-user again.
#
# Update this list when Cloudflare publishes new ranges:
#   https://www.cloudflare.com/ips-v4  |  https://www.cloudflare.com/ips-v6
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# ── Login rate limit ────────────────────────────────────────────────────────
# Only counts POST requests (credential submissions), not GET (fetching the
# login form). Empty key = no limit, so GETs bypass this zone entirely and
# ride the general zone below instead.
map $request_method $login_limit_key {
    default "";
    POST    $binary_remote_addr;
}
limit_req_zone $login_limit_key zone=login:10m rate=20r/m;

# API: 30 requests/second per real IP.
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# General pages: 20 requests/second per real IP.
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

# Return 429 Too Many Requests (not the default 503).
limit_req_status 429;
