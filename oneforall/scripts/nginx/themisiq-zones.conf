# ThemisIQ nginx rate limiting zones.
# Installed to /etc/nginx/conf.d/themisiq-zones.conf by deploy.py.
# Must live in http context (conf.d is included before sites-enabled).

# Login: 5 requests/minute per IP (anti brute-force)
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# API: 30 requests/second per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# General pages: 20 requests/second per IP
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

# Return 429 Too Many Requests (not the default 503)
limit_req_status 429;
