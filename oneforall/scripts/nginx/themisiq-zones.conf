# ThemisIQ nginx rate limiting zones.
# Installed to /etc/nginx/conf.d/themisiq-zones.conf by deploy.py.
# Must live in http context (conf.d is included before sites-enabled).

# Use the real client IP from Cloudflare, not Cloudflare's proxy IP.
# CF-Connecting-IP carries the true visitor address; fall back to
# X-Forwarded-For, then to the socket address if neither is set.
map $http_cf_connecting_ip $real_client_ip {
    ""      $http_x_forwarded_for;
    default $http_cf_connecting_ip;
}
map $real_client_ip $rate_limit_key {
    ""      $binary_remote_addr;
    default $real_client_ip;
}

# Login: 5 requests/minute per real IP (anti brute-force)
limit_req_zone $rate_limit_key zone=login:10m rate=5r/m;

# API: 30 requests/second per real IP
limit_req_zone $rate_limit_key zone=api:10m rate=30r/s;

# General pages: 20 requests/second per real IP
limit_req_zone $rate_limit_key zone=general:10m rate=20r/s;

# Return 429 Too Many Requests (not the default 503)
limit_req_status 429;
