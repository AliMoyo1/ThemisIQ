<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ThemisIQ{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1116;
  --surface: #1b1e26;
  --surface2: #242831;
  --surface3: #2d323d;
  --border: #2d323d;
  --border-soft: #242831;
  --text: #e8e6e3;
  --text-muted: #8b8d94;
  --ink: #e8e6e3;
  --muted: #8b8d94;
  --primary: #6c63ff;
  --primary-dark: #5548d9;
  --good: #4ade80;
  --good-soft: rgba(74,222,128,0.12);
  --warn: #fbbf24;
  --warn-soft: rgba(251,191,36,0.12);
  --bad: #f87171;
  --bad-soft: rgba(248,113,113,0.12);
  --info: #60a5fa;
  --info-soft: rgba(96,165,250,0.12);
  --purple: #a78bfa;
  --purple-soft: rgba(167,139,250,0.12);
  --shadow: 0 4px 16px rgba(0,0,0,0.25);
  --r-md: 12px;
  --r-lg: 16px;
  --font: 'DM Sans', sans-serif;
  --display: 'Space Grotesk', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.admin-shell {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 28px 48px;
}
.admin-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.admin-header h1 {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 700;
}
.admin-nav {
  display: flex;
  align-items: center;
  gap: 12px;
}
.admin-nav a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 8px;
  transition: background 0.15s, color 0.15s;
}
.admin-nav a:hover { background: var(--surface2); color: var(--text); }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 22px;
  box-shadow: var(--shadow);
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 15px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  font-family: var(--font);
  text-decoration: none;
  transition: background 0.15s, color 0.15s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-ghost { background: var(--surface2); color: var(--text); border-color: var(--border); }
.btn-ghost:hover { background: var(--surface3); }
.btn-danger { background: var(--bad-soft); color: var(--bad); }
.btn-danger:hover { background: rgba(248,113,113,0.2); }
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
}
.badge-good { background: var(--good-soft); color: var(--good); }
.badge-bad { background: var(--bad-soft); color: var(--bad); }
.badge-warn { background: var(--warn-soft); color: var(--warn); }
.badge-info { background: var(--info-soft); color: var(--info); }
.badge-purple { background: var(--purple-soft); color: var(--purple); }
.badge-neutral { background: var(--surface2); color: var(--text-muted); }
.badge-platform { background: var(--surface2); color: var(--text-muted); }
table { width: 100%; border-collapse: collapse; }
th {
  padding: 10px 14px;
  text-align: left;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}
td {
  padding: 12px 14px;
  font-size: 13px;
  border-bottom: 1px solid var(--border-soft);
  vertical-align: middle;
}
tbody tr:hover td { background: rgba(255,255,255,0.03); }
select, input, textarea {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 8px 12px;
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  width: 100%;
}
select:focus, input:focus, textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
}
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 10.5px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 6px;
  letter-spacing: 0.7px;
  text-transform: uppercase;
}
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 28px;
  width: 520px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-title {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
}
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 18px;
  font-size: 13px;
  box-shadow: var(--shadow);
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 1000;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 3px solid var(--good); }
.toast.error { border-left: 3px solid var(--bad); }
.alert {
  padding: 14px 18px;
  border-radius: 10px;
  font-size: 13px;
  margin-bottom: 16px;
}
.alert-error { background: var(--bad-soft); color: var(--bad); border: 1px solid rgba(248,113,113,0.3); }
.alert-success { background: var(--good-soft); color: var(--good); border: 1px solid rgba(74,222,128,0.3); }
.alert-info { background: var(--info-soft); color: var(--info); border: 1px solid rgba(96,165,250,0.3); }
@media (max-width: 768px) {
  .admin-shell { padding: 16px; }
}
</style>
{% block head %}{% endblock %}
</head>
<body>
<div class="admin-shell">
  <div class="admin-header">
    <h1>{% block header_title %}ThemisIQ{% endblock %}</h1>
    <div class="admin-nav">
      <a href="/">Home</a>
      {% if user %}
      <a href="/admin/users">Users & Roles</a>
      <a href="/change-password">Password</a>
      <a href="#" onclick="document.getElementById('logoutForm2').submit();return false">Logout</a>
      <form id="logoutForm2" method="POST" action="/logout" style="display:none"></form>
      {% endif %}
    </div>
  </div>
  {% block content %}{% endblock %}
</div>
<div class="toast" id="toast"></div>
<script>
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success') + ' show';
  setTimeout(function() { t.className = 'toast'; }, 3000);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
