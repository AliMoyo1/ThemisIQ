<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoPAforge — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#03080f;--bg2:#060d18;--bg3:#091525;
  --panel:#0a1a2e;--panel2:#0d2040;
  --border:#0e3a60;--border2:#1a5280;
  --accent:#00d4ff;--accent2:#00ff88;--accent3:#ff6b35;
  --text:#c8e8ff;--text2:#6aa3cc;--text3:#3d6a8a;
  --danger:#ff3d5a;--warn:#ffaa00;
  --font:'Exo 2',sans-serif;--mono:'Share Tech Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}

/* animated grid background */
.grid-bg{position:fixed;inset:0;opacity:.4;background-image:linear-gradient(rgba(0,212,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.07) 1px,transparent 1px);background-size:40px 40px;animation:gridMove 20s linear infinite}
@keyframes gridMove{0%{background-position:0 0}100%{background-position:40px 40px}}

/* scanline */
.scanline{position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.012) 2px,rgba(0,212,255,.012) 4px)}

/* floating particles */
.particles{position:fixed;inset:0;overflow:hidden;pointer-events:none}
.particle{position:absolute;width:2px;height:2px;background:var(--accent);border-radius:50%;opacity:0;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:.6}90%{opacity:.3}100%{transform:translateY(-10vh) translateX(60px);opacity:0}}

/* center wrapper */
.login-wrap{position:relative;z-index:10;height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}

/* login card */
.login-card{background:rgba(10,26,46,.92);border:1px solid var(--border2);border-radius:12px;padding:2.5rem;width:100%;max-width:420px;backdrop-filter:blur(16px);position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);animation:scanH 3s ease-in-out infinite}
@keyframes scanH{0%,100%{opacity:.4}50%{opacity:1}}

/* logo */
.login-logo{display:flex;align-items:center;gap:1rem;margin-bottom:2rem}
/* Icon mark — hexagonal forge mark */
.login-icon{
  width:52px;height:52px;flex-shrink:0;position:relative;
  display:flex;align-items:center;justify-content:center;
  animation:iconPulse 3s ease-in-out infinite;
}
.login-icon svg{width:52px;height:52px;}
@keyframes iconPulse{
  0%,100%{filter:drop-shadow(0 0 0px rgba(0,212,255,.5));}
  50%{filter:drop-shadow(0 0 10px rgba(0,212,255,.7));}
}
.login-logo-text{flex:1}
/* RoPAforge wordmark */
.login-wordmark{
  display:flex;align-items:baseline;gap:0;line-height:1;margin-bottom:.18rem;
}
.wm-ropa{
  font-size:1.45rem;font-weight:700;letter-spacing:.06em;
  color:var(--accent);font-family:var(--font);text-transform:uppercase;
}
.wm-forge{
  font-size:1.45rem;font-weight:300;letter-spacing:.04em;
  color:var(--text);font-family:var(--font);text-transform:uppercase;
}
.wm-divider{
  width:1.5px;height:1.1rem;background:var(--accent2);
  margin:0 .45rem;opacity:.7;align-self:center;flex-shrink:0;
}
.login-byline{
  font-size:.6rem;font-family:var(--mono);letter-spacing:.22em;
  color:var(--accent2);text-transform:uppercase;margin-bottom:.12rem;
  display:flex;align-items:center;gap:.4rem;
}
.login-byline::before{content:'';display:inline-block;width:16px;height:1px;background:var(--accent2);opacity:.5;}
.login-sub{font-size:.58rem;color:var(--text3);font-family:var(--mono);letter-spacing:.15em;margin-top:.1rem}

/* divider */
.login-divider{border:none;border-top:1px solid var(--border);margin:0 0 1.75rem}

/* form */
.form-group{margin-bottom:1.1rem}
.form-label{display:block;font-size:.68rem;color:var(--text2);font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;margin-bottom:.45rem}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.65rem .9rem;font-family:var(--font);font-size:.9rem;color:var(--text);outline:none;transition:all .2s}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.12)}
.form-input::placeholder{color:var(--text3)}
.form-input.error{border-color:var(--danger);box-shadow:0 0 0 3px rgba(255,61,90,.12)}

/* password wrapper */
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text3);font-size:.8rem;font-family:var(--mono);user-select:none;transition:color .2s}
.pw-toggle:hover{color:var(--accent)}

/* error msg */
.error-msg{display:none;background:rgba(255,61,90,.08);border:1px solid rgba(255,61,90,.3);border-radius:5px;padding:.6rem .85rem;font-size:.78rem;color:var(--danger);font-family:var(--mono);margin-bottom:1rem;letter-spacing:.03em}
.error-msg.show{display:flex;align-items:center;gap:.5rem}

/* login button */
.login-btn{width:100%;padding:.75rem;background:rgba(0,212,255,.1);border:1.5px solid var(--accent);border-radius:6px;color:var(--accent);font-family:var(--font);font-size:.9rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;margin-top:.25rem}
.login-btn:hover:not(:disabled){background:rgba(0,212,255,.2);box-shadow:0 0 20px rgba(0,212,255,.25)}
.login-btn:active{transform:scale(.98)}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-btn .btn-text{transition:opacity .2s}
.login-btn.loading .btn-text{opacity:0}
.login-btn .btn-spinner{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-family:var(--mono);font-size:.75rem;letter-spacing:.1em;color:var(--accent)}
.login-btn.loading .btn-spinner{display:flex}

/* hint box */
.hint-box{margin-top:1.5rem;background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.12);border-radius:6px;padding:.8rem 1rem}
.hint-title{font-size:.62rem;font-family:var(--mono);color:var(--text3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.5rem}
.hint-row{display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.25rem;color:var(--text2)}
.hint-row:last-child{margin-bottom:0}
.hint-val{font-family:var(--mono);color:var(--accent);font-size:.72rem}

/* footer */
.login-footer{text-align:center;margin-top:1.25rem;font-size:.65rem;color:var(--text3);font-family:var(--mono);letter-spacing:.08em}

/* success flash */
.success-flash{position:fixed;inset:0;background:rgba(0,255,136,.06);pointer-events:none;opacity:0;z-index:9998;transition:opacity .3s}
.success-flash.show{opacity:1}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="scanline"></div>
<div class="particles" id="particles"></div>
<div class="success-flash" id="success-flash"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <!-- Forge mark: hexagon with RF initials -->
      <div class="login-icon">
        <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer hex -->
          <polygon points="26,2 48,14 48,38 26,50 4,38 4,14"
            fill="rgba(0,212,255,0.07)" stroke="#00d4ff" stroke-width="1.5"/>
          <!-- Inner hex accent -->
          <polygon points="26,9 42,18 42,34 26,43 10,34 10,18"
            fill="none" stroke="rgba(0,212,255,0.25)" stroke-width="0.75"/>
          <!-- RF letters -->
          <text x="26" y="31" text-anchor="middle" font-family="'Exo 2',sans-serif"
            font-weight="700" font-size="14" fill="#00d4ff" letter-spacing="1">RF</text>
          <!-- Corner accent dots -->
          <circle cx="26" cy="2"  r="1.5" fill="#00ff88" opacity="0.8"/>
          <circle cx="48" cy="14" r="1.5" fill="#00d4ff" opacity="0.6"/>
          <circle cx="48" cy="38" r="1.5" fill="#00d4ff" opacity="0.6"/>
          <circle cx="26" cy="50" r="1.5" fill="#00ff88" opacity="0.8"/>
          <circle cx="4"  cy="38" r="1.5" fill="#00d4ff" opacity="0.6"/>
          <circle cx="4"  cy="14" r="1.5" fill="#00d4ff" opacity="0.6"/>
        </svg>
      </div>
      <div class="login-logo-text">
        <div class="login-wordmark">
          <span class="wm-ropa">RoPA</span>
          <span class="wm-divider"></span>
          <span class="wm-forge">forge</span>
        </div>
        <div class="login-byline">by Ali Moyo</div>
        <div class="login-sub">GDPR Art. 30 · Record of Processing Activities</div>
      </div>
    </div>
    <hr class="login-divider">

    <div class="error-msg" id="error-msg">
      <span>⚠</span><span id="error-text">Invalid credentials. Please try again.</span>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
          <span class="pw-toggle" id="pw-toggle" onclick="togglePassword()">SHOW</span>
        </div>
      </div>
      <button class="login-btn" type="submit" id="login-btn">
        <span class="btn-text">ACCESS SYSTEM</span>
        <span class="btn-spinner">AUTHENTICATING...</span>
      </button>
    </form>

    <div class="hint-box">
      <div class="hint-title">// Default Credentials</div>
      <div class="hint-row"><span>Username</span><span class="hint-val">admin</span></div>
      <div class="hint-row"><span>Password</span><span class="hint-val">ropa2024</span></div>
      <div class="hint-row" style="margin-top:.5rem;font-size:.68rem;color:var(--text3)"><span>Change in <code style="color:var(--accent3)">config.js</code></span></div>
    </div>

    <div class="login-footer">SECURE LOCAL SESSION · DATA STAYS IN YOUR BROWSER</div>
  </div>
</div>

<script>
/* ── Particles ── */
(function spawnParticles(){
  const wrap=document.getElementById('particles');
  for(let i=0;i<30;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(8+Math.random()*14)+'s';
    p.style.animationDelay=(Math.random()*12)+'s';
    p.style.width=p.style.height=(1+Math.random()*2)+'px';
    p.style.opacity=Math.random()*.7;
    wrap.appendChild(p);
  }
})();

/* ── Load credentials from config.js ── */
const USERS=(typeof ROPA_CONFIG!=='undefined'&&ROPA_CONFIG.users)?ROPA_CONFIG.users:[{username:'admin',password:'ropa2024',displayName:'Administrator'}];

function togglePassword(){
  const inp=document.getElementById('password');
  const tog=document.getElementById('pw-toggle');
  if(inp.type==='password'){inp.type='text';tog.textContent='HIDE';}
  else{inp.type='password';tog.textContent='SHOW';}
}

function showError(msg){
  const el=document.getElementById('error-msg');
  document.getElementById('error-text').textContent=msg;
  el.classList.add('show');
  document.getElementById('username').classList.add('error');
  document.getElementById('password').classList.add('error');
  setTimeout(()=>{
    el.classList.remove('show');
    document.getElementById('username').classList.remove('error');
    document.getElementById('password').classList.remove('error');
  },4000);
}

function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('login-btn');
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;

  btn.classList.add('loading');
  btn.disabled=true;

  setTimeout(()=>{
    const user=USERS.find(u=>u.username===username&&u.password===password);
    if(user){
      // Store session
      sessionStorage.setItem('ropa_session',JSON.stringify({
        username:user.username,
        displayName:user.displayName||user.username,
        loginTime:new Date().toISOString()
      }));
      // Flash green then redirect
      document.getElementById('success-flash').classList.add('show');
      setTimeout(()=>window.location.href='index.html',500);
    } else {
      btn.classList.remove('loading');
      btn.disabled=false;
      showError('Invalid username or password. Please try again.');
    }
  },900);
}

// If already logged in, go straight to app
if(sessionStorage.getItem('ropa_session')){
  window.location.href='index.html';
}
</script>
</body>
</html>
