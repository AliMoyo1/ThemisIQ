services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: themisiq
      POSTGRES_USER: themisiq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U themisiq"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Bind to loopback only — not reachable from outside the VPS.
    ports:
      - "127.0.0.1:5432:5432"
    mem_limit: 1g
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://themisiq:${POSTGRES_PASSWORD}@db:5432/themisiq
      WORKERS: "2"
    env_file:
      - oneforall/.env
    volumes:
      - ./data/backups:/app/data/backups
      - ./data/grid_uploads:/app/data/grid_uploads
      - ./data/evidence:/app/data/evidence
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 1g
    cpus: 2
    ports:
      - "127.0.0.1:8080:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
